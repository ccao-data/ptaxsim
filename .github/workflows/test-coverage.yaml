on:
  pull_request:
  push:
    branches: [main, master]

name: test-coverage

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Prepare PTAXSIM database
        id: prep_ptaxsim_db
        uses: ./.github/actions/prepare-ptaxsim

      - name: Set PTAXSIM database path
        run: echo "PTAXSIM_DB_PATH=${{ steps.prep_ptaxsim_db.outputs.PTAXSIM_DB_DIR }}/ptaxsim.db" >> $GITHUB_ENV
        shell: bash

      - name: Generate lookup_agency output
        shell: bash
        run: |
          Rscript -e '
            library(ptaxsim)

            ptaxsim_db_conn <- DBI::dbConnect(RSQLite::SQLite(), Sys.getenv("PTAXSIM_DB_PATH"))
            assign("ptaxsim_db_conn", ptaxsim_db_conn, envir = .GlobalEnv)

            write.csv(
              lookup_agency(2014:2019, "12064"),
              "agency_2014_to_2019_ci.csv",
              row.names = FALSE
            )

            sum_df <- sample_tax_bills_summary
            write.csv(
              lookup_agency(sum_df$year, sum_df$tax_code),
              "agency_summary_ci.csv",
              row.names = FALSE
            )
          '

      - name: Upload lookup_agency output part 1
        uses: actions/upload-artifact@v4
        with:
          name: agency-2014-2019-ci
          path: agency_2014_to_2019_ci.csv

      - name: Upload lookup_agency output part 2
        uses: actions/upload-artifact@v4
        with:
          name: agency-summary-ci
          path: agency_summary_ci.csv

      - name: Test coverage
        run: |
          covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
